<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillTwin | Solicitud recibida</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #040714;
      --surface: rgba(15, 23, 42, 0.92);
      --border: rgba(148, 163, 184, 0.14);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 26%), var(--bg);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .card {
      width: min(720px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.5rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      text-align: center;
    }
    .badge { display: inline-block; margin-bottom: 1rem; padding: 0.45rem 0.9rem; border-radius: 999px; background: rgba(56, 189, 248, 0.12); color: var(--accent); font-weight: 700; }
    h1 { margin: 0 0 1rem; font-size: clamp(2rem, 3vw, 2.6rem); }
    p { color: var(--muted); line-height: 1.75; }
    .actions { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-top: 1.8rem; }
    .btn { display: inline-block; padding: 0.9rem 1.35rem; border-radius: 999px; text-decoration: none; font-weight: 700; }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #0ea5e9); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Solicitud recibida</div>
    <h1>Gracias por contactar con SkillTwin</h1>
    <p>Tu mensaje ha sido recibido correctamente. El equipo revisará la solicitud y te responderá en breve con una propuesta o una demo personalizada.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Volver a la landing</a>
      <a class="btn btn-secondary" href="/index.html">Abrir el dashboard</a>
    </div>
  </main>
</body>
</html>
